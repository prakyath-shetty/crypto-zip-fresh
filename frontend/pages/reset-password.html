<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #030e1a;
    --card: #0b1f35;
    --card2: #0d2540;
    --border: rgba(0, 200, 255, 0.1);
    --cyan: #00e5ff;
    --green: #00ff9c;
    --red: #ff4d6d;
    --text: #e0f0ff;
    --muted: #4a7090;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text);
    overflow: hidden;
    background: var(--bg);
}

.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, #0a2540 0%, #061828 45%, #030e1a 100%);
    z-index: 0;
}

.bg::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 45%;
    height: 100%;
    background: radial-gradient(ellipse at right center, rgba(0,229,255,0.08) 0%, transparent 70%);
}

.bokeh-container {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
}

.bokeh {
    position: absolute;
    border-radius: 50%;
    animation: bokehFloat ease-in-out infinite;
}

@keyframes bokehFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
}

.container {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 48px 40px;
    border-radius: 20px;
    width: 440px;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,229,255,0.05);
    position: relative;
    z-index: 10;
}

.lock-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cyan);
    margin-bottom: 28px;
    display: block;
}

.logo span { color: var(--green); }

h2 {
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
}

.subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 28px;
    line-height: 1.5;
}

.form-group {
    text-align: left;
    margin-bottom: 14px;
}

.form-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: block;
}

input {
    width: 100%;
    padding: 13px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card2);
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
}

input:focus {
    border-color: var(--cyan);
}

input::placeholder {
    color: var(--muted);
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
}

button:hover { opacity: 0.88; }

.send-btn {
    background: linear-gradient(90deg, var(--cyan), var(--green));
    color: #000;
}

.msg {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    text-align: left;
}

.msg.error {
    display: block;
    background: rgba(255,77,109,0.12);
    border: 1px solid rgba(255,77,109,0.3);
    color: var(--red);
}

.msg.success {
    display: block;
    background: rgba(0,255,156,0.1);
    border: 1px solid rgba(0,255,156,0.3);
    color: var(--green);
}

.back {
    margin-top: 20px;
}

.back a {
    color: var(--cyan);
    text-decoration: none;
    font-size: 13px;
}

.back a:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<body>

<div class="bg"></div>
<div class="bokeh-container" id="bokeh"></div>

<div class="container">

<span class="logo">Crypto<span>Track</span></span>
<span class="lock-icon">🔑</span>
<h2>Reset Password</h2>
<p class="subtitle">Enter your new password below</p>

<div id="msg" class="msg"></div>

<div class="form-group">
    <label class="form-label">New Password</label>
    <input type="password" id="password" placeholder="Enter new password">
</div>
<div class="form-group">
    <label class="form-label">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
</div>

<button class="send-btn" onclick="handleReset()">🔐 Reset Password</button>

<div class="back">
<a href="../index.html">← Back to Login</a>
</div>

</div>

<script>
// BOKEH SAME
const bokeh = document.getElementById('bokeh');
for(let i=0;i<50;i++){
    const d=document.createElement('div');
    const size=Math.random()*16+4;
    d.className='bokeh';
    d.style.cssText=`
        width:${size}px;
        height:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        background:rgba(0,229,255,0.3);
        filter:blur(2px);
        animation-duration:${Math.random()*6+4}s;
    `;
    bokeh.appendChild(d);
}

// TOKEN
const token=new URLSearchParams(window.location.search).get('token');

if(!token){
    const msg=document.getElementById('msg');
    msg.className='msg error';
    msg.textContent='Invalid reset link';
}

// RESET
async function handleReset(){
    const p=document.getElementById('password').value;
    const c=document.getElementById('confirmPassword').value;
    const msg=document.getElementById('msg');

    if(p!==c){
        msg.className='msg error';
        msg.textContent='Passwords do not match';
        return;
    }

    const _api = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:5000/api' : 'https://crypto-backend-d9v8.onrender.com/api';
   const res = await apiFetch('/api/auth/reset-password', {
    method: 'POST',
    body: JSON.stringify({ token, password: p })
});

    const data=await res.json();

    if(data.success){
        msg.className='msg success';
        msg.textContent='Password reset successful';
    } else {
        msg.className='msg error';
        msg.textContent=data.message;
    }
}
</script>
<script src="../crypto-api.js"></script>

</body>
</html>
